name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CRATE_MANIFEST: crates/repo-cli/Cargo.toml
  CRATE_DIR: crates/repo-cli
  BIN_NAME: repo
  ASSET_PREFIX: therepo

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - runner: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --manifest-path "$CRATE_MANIFEST" --target "${{ matrix.target }}"

      - name: Package unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "crates/repo-cli/target/${{ matrix.target }}/release/${BIN_NAME}" "./${BIN_NAME}"
          tar -czf "dist/${ASSET_PREFIX}-${{ matrix.target }}.tar.gz" "${BIN_NAME}"

      - name: Package windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "crates/repo-cli/target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" "${env:BIN_NAME}.exe"
          Compress-Archive -Path "${env:BIN_NAME}.exe" -DestinationPath "dist/${env:ASSET_PREFIX}-${{ matrix.target }}.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*

  installer:
    name: upload installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render installer with repository slug
        run: |
          mkdir -p dist
          sed "s|__GITHUB_REPOSITORY__|${GITHUB_REPOSITORY}|g" scripts/install.sh > dist/therepo-installer.sh
          chmod +x dist/therepo-installer.sh

      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/therepo-installer.sh
